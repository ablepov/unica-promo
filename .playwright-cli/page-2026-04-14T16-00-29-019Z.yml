                - paragraph [ref=e269]: "[Анна, 11:03:00-11:03:16]: Коллеги, давайте зафиксируем, что показываем «СеверЛогистику» на встрече в четверг, потому что после созвона мне нужно отправить клиенту письмо с договоренностями."
                - paragraph [ref=e270]: "[Игорь, 11:03:17-11:03:39]: У них главный запрос не про красивый интерфейс, а про скорость. Руководитель клиентского отдела хочет открыть одну рабочую страницу и сразу понять, что происходит по сделке, по договору и по последним письмам."
                - paragraph [ref=e271]: "[Анна, 11:03:40-11:03:55]: Да, и для них ключевая формулировка — единое окно. Они несколько раз повторили это почти одними и теми же словами, значит именно через это и надо строить весь показ."
                - paragraph [ref=e272]: "[Мария, 11:03:56-11:04:18]: Я бы первым сценарием дала вопрос по клиенту, потом поиск по договору, потом краткий пересказ длинной переписки, чтобы они сразу увидели, что не нужно читать двадцать писем руками."
                - paragraph [ref=e273]: "[Дмитрий, 11:04:19-11:04:40]: По данным на первом этапе берем систему продаж и хранилище документов. Почту лучше сейчас не обещать, иначе мы уйдем в подготовку подключения и снова потеряем неделю."
                - paragraph [ref=e274]: "[Ольга, 11:05:01-11:05:23]: Еще надо заранее снять возражение юристов. Они вернулись к теме прав доступа и спросили, увидит ли отдел продаж внутренние комментарии по договору и служебные пометки."
                - paragraph [ref=e275]: "[Игорь, 11:05:24-11:05:45]: Тогда в показе делаем отдельную сцену: один и тот же вопрос от менеджера и от юриста, чтобы было видно, что ответы разные и зависят от роли человека."
                - paragraph [ref=e276]: "[Анна, 11:07:20-11:07:46]: Тогда договорились так: Мария собирает сценарий показа, Игорь готовит примеры вопросов, Ольга описывает разграничение доступа, а я к вечеру отправляю клиенту письмо с планом пробного запуска."
