          - generic [ref=e468]:
            - generic [ref=e469]:
              - paragraph [ref=e470]: "[Анна, 11:03:00-11:03:16]: Коллеги, давайте зафиксируем, что показываем «СеверЛогистику» на встрече в четверг, потому что после созвона мне нужно отправить клиенту письмо с договоренностями."
              - paragraph [ref=e471]: "[Игорь, 11:03:17-11:03:39]: У них главный запрос не про красивый интерфейс, а про скорость. Руководитель клиентского отдела хочет открыть одну рабочую страницу и сразу понять, что происходит по сделке, по договору и по последним письмам."
              - paragraph [ref=e472]: "[Анна, 11:03:40-11:03:55]: Да, и для них ключевая формулировка — единое окно. Они несколько раз повторили это почти одними и теми же словами, значит именно через это и надо строить весь показ."
              - paragraph [ref=e473]: "[Мария, 11:03:56-11:04:18]: Я бы первым сценарием дала вопрос по клиенту, потом поиск по договору, потом краткий пересказ длинной переписки, чтобы они сразу увидели, что не нужно читать двадцать писем руками."
              - paragraph [ref=e474]: "[Дмитрий, 11:04:19-11:04:40]: По данным на первом этапе берем систему продаж и хранилище документов. Почту лучше сейчас не обещать, иначе мы уйдем в подготовку подключения и снова потеряем неделю."
              - paragraph [ref=e475]: "[Анна, 11:04:41-11:05:00]: Согласна. Лучше честно сказать, что в пробном запуске мы берем два источника, а переписку подключаем следующим шагом, когда они подтвердят полезность на живых вопросах."
              - paragraph [ref=e476]: "[Ольга, 11:05:01-11:05:23]: Еще надо заранее снять возражение юристов. Они вчера два раза вернулись к теме прав доступа и спросили, увидит ли отдел продаж внутренние комментарии по договору и служебные пометки."
              - paragraph [ref=e477]: "[Игорь, 11:05:24-11:05:45]: Тогда в показе делаем отдельную сцену: один и тот же вопрос от менеджера и от юриста, чтобы было видно, что ответы разные и зависят от роли человека."
              - paragraph [ref=e478]: "[Мария, 11:05:46-11:06:10]: И давайте без общих слов вроде «ускоряем работу». Им нужны понятные цифры: сколько времени уходит на поиск нужной версии договора сейчас и сколько будет уходить после запуска."
              - paragraph [ref=e479]: "[Анна, 11:06:11-11:06:33]: Хорошо, я тогда попрошу аналитиков посчитать на их примере путь от входящего письма до согласования ответа. Если у нас будет живая оценка по минутам, разговор станет намного предметнее."
              - paragraph [ref=e480]: "[Дмитрий, 11:06:34-11:06:56]: По составу встречи с их стороны будут коммерческий директор, руководитель направления и человек из отдела технологий. Значит, нам надо держать баланс: без лишней технической глубины, но с понятным ответом, где хранятся данные и как они обновляются."
              - paragraph [ref=e481]: "[Ольга, 11:06:57-11:07:19]: Еще важно показать удобный рабочий путь, а не просто поиск. Они боятся «еще одной системы», в которую сотрудники не зайдут. Значит, надо показать цепочку целиком: спросил, получил ответ, открыл источник, переслал коллеге."
              - paragraph [ref=e482]: "[Анна, 11:07:20-11:07:46]: Тогда договорились так: Мария собирает сценарий показа, Игорь готовит примеры вопросов, Ольга описывает разграничение доступа, Дмитрий формулирует короткое объяснение по хранению данных, а я к вечеру отправляю клиенту письмо с планом пробного запуска на две недели."
